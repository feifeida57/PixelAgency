<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelAgency Demo - 215位AI智能体虚拟办公室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
    }
    .header h1 {
      font-size: 20px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header p {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .dept-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }
    .dept-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      transition: all 0.2s;
    }
    .dept-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }
    .dept-btn.active {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #666;
    }
    .canvas-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: auto;
      max-height: 70vh;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .modal-emoji {
      font-size: 48px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }
    .modal-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 4px;
    }
    .modal-desc {
      color: #666;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .modal-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .modal-info span:first-child {
      color: #999;
    }
    .demo-notice {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #92400e;
    }
    .search-box {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      width: 200px;
      outline: none;
    }
    .search-box:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }
    .theme-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .theme-btn:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏢 PixelAgency Demo</h1>
    <p>215位AI智能体虚拟办公室 - 点击智能体查看详情</p>
  </div>

  <div class="container">
    <div class="demo-notice">
      ⚠️ 这是 Demo 页面，展示虚拟办公室效果。完整版需要集成到 PilotDeck 中使用。
    </div>

    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
      <div class="dept-selector" id="deptSelector" style="flex:1;margin-bottom:0;"></div>
      <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索智能体...">
      <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
    </div>

    <div class="stats" id="stats">
      <span>👥 0 人</span>
      <span>🔥 0 工作中</span>
      <span>🎮 0 摸鱼</span>
      <span>😴 0 睡觉</span>
    </div>

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="modal" id="modal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-emoji" id="modalEmoji"></div>
        <div>
          <div class="modal-title" id="modalName"></div>
          <div class="modal-badge" id="modalBehavior"></div>
        </div>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-info">
        <span>部门</span>
        <span id="modalDept"></span>
      </div>
      <div class="modal-info">
        <span>ID</span>
        <span id="modalId" style="font-family:monospace;font-size:12px"></span>
      </div>
      <div id="modalHistory" style="margin-top:16px;padding-top:16px;border-top:1px solid #eee;display:none;">
        <h4 style="font-size:12px;color:#999;margin-bottom:8px;">最近任务</h4>
        <div id="modalHistoryList" style="max-height:120px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <script>
    // 智能体数据（简化版，实际从 agent-index.json 加载）
    const DEPT_LIST = [
      { key: 'engineering', name: '工程部', emoji: '💻', color: '#3B82F6' },
      { key: 'design', name: '设计部', emoji: '🎨', color: '#A855F7' },
      { key: 'marketing', name: '营销部', emoji: '📱', color: '#EC4899' },
      { key: 'product', name: '产品部', emoji: '📋', color: '#F59E0B' },
      { key: 'finance', name: '金融部', emoji: '💰', color: '#10B981' },
      { key: 'sales', name: '销售部', emoji: '💼', color: '#6366F1' },
      { key: 'specialized', name: '专家团', emoji: '⭐', color: '#F97316' },
      { key: 'testing', name: '测试部', emoji: '🧪', color: '#14B8A6' },
      { key: 'support', name: '支持部', emoji: '🛠️', color: '#8B5CF6' },
      { key: 'hr', name: '人事部', emoji: '👥', color: '#06B6D4' },
      { key: 'legal', name: '法务部', emoji: '⚖️', color: '#64748B' },
      { key: 'academic', name: '学术部', emoji: '📚', color: '#7C3AED' },
      { key: 'game-development', name: '游戏开发', emoji: '🎮', color: '#EF4444' },
      { key: 'supply-chain', name: '供应链', emoji: '📦', color: '#84CC16' },
      { key: 'project-management', name: '项目办', emoji: '📊', color: '#0EA5E9' },
      { key: 'paid-media', name: '投放部', emoji: '📢', color: '#D946EF' },
      { key: 'spatial-computing', name: 'XR部', emoji: '🥽', color: '#2DD4BF' },
    ];

    const BEHAVIORS = {
      working:  { label: '工作中', icon: '💻', color: '#22C55E', duration: [15, 45] },
      gaming:   { label: '打游戏', icon: '🎮', color: '#F59E0B', duration: [5, 15] },
      sleeping: { label: '睡觉中', icon: '😴', color: '#6366F1', duration: [8, 20] },
      coffee:   { label: '喝咖啡', icon: '☕', color: '#92400E', duration: [3, 8] },
      chatting: { label: '聊天中', icon: '💬', color: '#3B82F6', duration: [4, 12] },
      idle:     { label: '发呆中', icon: '🫠', color: '#9CA3AF', duration: [5, 15] },
      walking:  { label: '走动中', icon: '🚶', color: '#A855F7', duration: [2, 5] },
    };

    // 模拟智能体数据（带固定状态分布，便于截图展示）
    function generateAgents(dept, count) {
      const names = {
        'engineering': ['前端工程师', '后端工程师', '全栈工程师', '架构师', 'DevOps工程师', '测试工程师', '安全工程师', '数据库工程师', '运维工程师', 'AI工程师'],
        'design': ['UI设计师', 'UX设计师', '视觉设计师', '动效设计师', '品牌设计师', '插画师', '3D设计师', '设计系统设计师'],
        'marketing': ['营销经理', '内容运营', 'SEO专员', '社媒运营', '增长黑客', '品牌经理', '公关经理', '活动策划'],
        'product': ['产品经理', '需求分析师', '用户研究员', '数据产品经理', 'AI产品经理'],
        'finance': ['财务分析师', '会计', '审计师', '税务师', '投资分析师', '风控经理'],
        'sales': ['销售经理', '大客户经理', '商务拓展', '客户成功经理', '销售运营'],
        'specialized': ['技术顾问', 'AI专家', '安全专家', '区块链专家', '云架构师', '物联网专家'],
        'testing': ['测试工程师', '自动化测试', '性能测试', '安全测试', '测试开发'],
        'support': ['技术支持', '客服经理', '文档工程师', '培训讲师', '知识库经理'],
        'hr': ['HR经理', '招聘专员', '培训专员', '薪酬专员', '绩效专员'],
        'legal': ['法务经理', '合规经理', '知识产权经理', '合同经理'],
        'academic': ['研究员', '论文助手', '数据分析助手', '学术翻译'],
        'game-development': ['Unity工程师', '游戏策划', '游戏美术', '游戏音效', '游戏测试', '游戏运营'],
        'supply-chain': ['供应链经理', '采购经理', '物流经理', '仓储经理'],
        'project-management': ['项目经理', 'Scrum Master', '敏捷教练', 'PMO经理'],
        'paid-media': ['投放经理', '优化师', '数据分析师', '创意策划'],
        'spatial-computing': ['VR工程师', 'AR工程师', '3D建模师', '交互设计师'],
      };
      const emojis = ['👨‍💻', '👩‍💻', '👨‍🎨', '👩‍🎨', '👨‍💼', '👩‍💼', '👨‍🔬', '👩‍🔬', '👨‍🏫', '👩‍🏫', '👨‍🔧', '👩‍🔧'];
      const deptNames = names[dept] || ['智能体'];
      // 固定状态分布：前几个工作中，然后有打游戏、睡觉、喝咖啡等
      const fixedBehaviors = ['working', 'working', 'working', 'gaming', 'sleeping', 'coffee', 'chatting', 'idle', 'walking', 'working'];
      const agents = [];
      for (let i = 0; i < count; i++) {
        agents.push({
          id: `${dept}-${i}`,
          name: deptNames[i % deptNames.length],
          description: `这是${DEPT_LIST.find(d => d.key === dept)?.name || dept}的${deptNames[i % deptNames.length]}`,
          emoji: emojis[i % emojis.length],
          department: dept,
          behavior: fixedBehaviors[i % fixedBehaviors.length],
          x: 0, y: 0,
          walkTimer: Math.random() * 300,
          behaviorTimer: Math.random() * 200 + 100,
        });
      }
      return agents;
    }

    function randomBehavior() {
      const r = Math.random();
      if (r < 0.45) return 'working';
      if (r < 0.60) return 'gaming';
      if (r < 0.72) return 'sleeping';
      if (r < 0.82) return 'coffee';
      if (r < 0.90) return 'chatting';
      if (r < 0.96) return 'idle';
      return 'walking';
    }

    // 状态
    let currentDept = null;
    let agents = [];
    let selectedAgent = null;
    let frame = 0;
    let searchQuery = '';
    let taskHistory = [];

    // 搜索框事件
    document.getElementById('searchBox').addEventListener('input', (e) => {
      searchQuery = e.target.value;
    });

    // 主题切换
    let currentTheme = 'light';
    document.getElementById('themeBtn').addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.getElementById('themeBtn').textContent = currentTheme === 'light' ? '🌙' : '☀️';
    });

    // Canvas
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 1190;
    const H = 850;
    canvas.width = W * 2;
    canvas.height = H * 2;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(2, 2);

    // 初始化部门选择器
    const selector = document.getElementById('deptSelector');
    DEPT_LIST.forEach(dept => {
      const btn = document.createElement('button');
      btn.className = 'dept-btn';
      btn.textContent = `${dept.emoji} ${dept.name}`;
      btn.onclick = () => selectDept(dept.key);
      selector.appendChild(btn);
    });

    function selectDept(key) {
      currentDept = key;
      const count = Math.floor(Math.random() * 15) + 5;
      agents = generateAgents(key, count);
      layoutDesks();
      document.querySelectorAll('.dept-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(DEPT_LIST.find(d => d.key === key)?.name || ''));
      });
    }

    function layoutDesks() {
      const cols = Math.min(Math.ceil(Math.sqrt(agents.length * 1.6)), 6);
      const cellW = 102;
      const cellH = 94;
      const startX = (W - cols * cellW) / 2 + cellW / 2;
      const baseY = 80;
      agents.forEach((agent, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        agent.x = startX + col * cellW;
        agent.y = baseY + row * cellH;
      });
    }

    // 绘制办公室场景（支持深色主题）
    function drawOffice() {
      const isDark = currentTheme === 'dark';
      // 地板
      ctx.fillStyle = isDark ? '#1E1E1E' : '#F5F0EB';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = isDark ? '#2D2D2D' : '#E8E0D8';
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += 68) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 68) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      // 墙
      ctx.fillStyle = isDark ? '#2D2D2D' : '#E8E0D8';
      ctx.fillRect(0, 0, W, 60);
      ctx.fillStyle = isDark ? '#3D3D3D' : '#D4C9BE';
      ctx.fillRect(0, 57, W, 3);
      // 窗户
      for (let i = 0; i < 4; i++) {
        const wx = 100 + i * 240;
        ctx.fillStyle = isDark ? '#1E3A5F' : '#BFDBFE';
        ctx.fillRect(wx, 10, 136, 40);
        ctx.strokeStyle = isDark ? '#2563EB' : '#93C5FD';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, 10, 136, 40);
      }
      // 咖啡机
      ctx.font = '32px serif';
      ctx.fillText('☕', W - 60, 40);
      // 植物
      ctx.fillText('🌿', 30, 40);
      ctx.fillText('🪴', 60, H - 30);
      // 白板
      ctx.fillStyle = isDark ? '#92400E' : '#FBBF24';
      ctx.fillRect(W / 2 - 80, 8, 160, 44);
      ctx.strokeStyle = isDark ? '#B45309' : '#D97706';
      ctx.lineWidth = 1;
      ctx.strokeRect(W / 2 - 80, 8, 160, 44);
      ctx.font = '12px sans-serif';
      ctx.fillStyle = isDark ? '#FCD34D' : '#92400E';
      ctx.textAlign = 'center';
      ctx.fillText('📋 Sprint Board', W / 2, 25);
      ctx.fillText('✅ 进度: 68%', W / 2, 40);
      ctx.textAlign = 'left';
    }

    // 绘制智能体（增强动画版 + 搜索高亮）
    function drawAgent(agent) {
      const x = agent.x;
      const y = agent.y;
      const bc = BEHAVIORS[agent.behavior];
      const isWorking = agent.behavior === 'working';
      const isSearchMatch = searchQuery && agent.name.toLowerCase().includes(searchQuery.toLowerCase());

      // 身体
      ctx.fillStyle = isSearchMatch ? '#FEF3C7' : isWorking ? '#D1FAE5' : '#F3F4F6';
      ctx.strokeStyle = isSearchMatch ? '#F59E0B' : isWorking ? '#22C55E' : '#D1D5DB';
      ctx.lineWidth = isSearchMatch ? 3 : 2;
      roundRect(ctx, x - 24, y - 24, 48, 48, 7);
      ctx.fill();
      ctx.stroke();

      // 工作发光
      if (isWorking) {
        ctx.save();
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05) * 0.15;
        ctx.strokeStyle = '#22C55E';
        ctx.lineWidth = 3;
        roundRect(ctx, x - 27, y - 27, 54, 54, 9);
        ctx.stroke();
        ctx.restore();
      }

      // Emoji
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(agent.emoji, x, y - 2);

      // 行为气泡 + 特殊动画
      const bubbleY = y - 40;
      const bobble = Math.sin(frame * 0.08) * 3;
      ctx.font = '18px serif';

      switch (agent.behavior) {
        case 'working':
          // 打字动画：气泡上下抖动 + 光标闪烁
          ctx.fillText(bc.icon, x, bubbleY + bobble);
          if (frame % 60 < 30) {
            ctx.font = '10px monospace';
            ctx.fillStyle = '#22C55E';
            ctx.fillText('▌', x + 12, bubbleY + bobble);
          }
          break;

        case 'gaming':
          // 手柄摇晃动画
          const shake = Math.sin(frame * 0.15) * 4;
          ctx.fillText(bc.icon, x + shake, bubbleY + bobble);
          break;

        case 'sleeping':
          // ZZZ 气泡动画
          ctx.fillText(bc.icon, x, bubbleY + bobble);
          ctx.font = '12px serif';
          ctx.fillStyle = '#6366F1';
          const zOffset = (frame % 120) / 120;
          ctx.globalAlpha = 1 - zOffset;
          ctx.fillText('z', x + 15 + zOffset * 10, bubbleY - zOffset * 15);
          ctx.fillText('Z', x + 20 + zOffset * 8, bubbleY - zOffset * 20 - 5);
          ctx.globalAlpha = 1;
          break;

        case 'coffee':
          // 咖啡冒热气动画
          ctx.fillText(bc.icon, x, bubbleY + bobble);
          ctx.font = '10px serif';
          ctx.fillStyle = '#92400E';
          const steamPhase = frame % 60;
          if (steamPhase < 20) {
            ctx.globalAlpha = 0.6;
            ctx.fillText('~', x - 8, bubbleY - 10 - steamPhase * 0.5);
          } else if (steamPhase < 40) {
            ctx.globalAlpha = 0.4;
            ctx.fillText('~', x + 5, bubbleY - 15 - (steamPhase - 20) * 0.3);
          } else {
            ctx.globalAlpha = 0.2;
            ctx.fillText('~', x - 3, bubbleY - 12 - (steamPhase - 40) * 0.4);
          }
          ctx.globalAlpha = 1;
          break;

        case 'chatting':
          // 聊天气泡动画
          ctx.fillText(bc.icon, x, bubbleY + bobble);
          ctx.font = '8px serif';
          ctx.fillStyle = '#3B82F6';
          const chatPhase = frame % 90;
          if (chatPhase < 30) {
            ctx.globalAlpha = 0.7;
            ctx.fillText('💭', x + 18, bubbleY - 5);
          } else if (chatPhase < 60) {
            ctx.globalAlpha = 0.5;
            ctx.fillText('💭', x + 22, bubbleY - 10);
          }
          ctx.globalAlpha = 1;
          break;

        case 'walking':
          // 走动动画：气泡左右摇摆
          const walkBob = Math.sin(frame * 0.2) * 5;
          ctx.fillText(bc.icon, x + walkBob, bubbleY + bobble);
          break;

        default:
          ctx.fillText(bc.icon, x, bubbleY + bobble);
      }

      // 名字
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#6B7280';
      ctx.fillText(agent.name.slice(0, 6), x, y + 32);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // 互动系统状态
    let interactionTimer = 300 + Math.random() * 600;
    let activeInteraction = null;
    let interactionDuration = 0;

    // 动画循环
    function animate() {
      frame++;
      ctx.clearRect(0, 0, W, H);
      drawOffice();

      // 互动系统逻辑
      interactionTimer--;
      if (interactionTimer <= 0 && !activeInteraction) {
        const idleAgents = agents.filter(a => true);
        if (idleAgents.length >= 2) {
          const interactionTypes = ['chat', 'coffee', 'meeting', 'collaborate'];
          const type = interactionTypes[Math.floor(Math.random() * interactionTypes.length)];
          const count = type === 'meeting' ? Math.min(3 + Math.floor(Math.random() * 3), idleAgents.length) : 2;
          const selectedIndices = [];
          const firstIdx = Math.floor(Math.random() * idleAgents.length);
          selectedIndices.push(firstIdx);
          for (let i = 1; i < count; i++) {
            let minDist = Infinity;
            let nearestIdx = -1;
            for (let j = 0; j < idleAgents.length; j++) {
              if (selectedIndices.includes(j)) continue;
              const dx = idleAgents[j].x - idleAgents[firstIdx].x;
              const dy = idleAgents[j].y - idleAgents[firstIdx].y;
              const dist = dx * dx + dy * dy;
              if (dist < minDist) {
                minDist = dist;
                nearestIdx = j;
              }
            }
            if (nearestIdx >= 0) selectedIndices.push(nearestIdx);
          }
          activeInteraction = {
            type,
            agents: selectedIndices.map(i => idleAgents[i].id)
          };
          interactionDuration = 300 + Math.random() * 300;
          selectedIndices.forEach(i => {
            const agent = idleAgents[i];
            switch (type) {
              case 'chat': agent.behavior = 'chatting'; break;
              case 'coffee': agent.behavior = 'coffee'; break;
              case 'meeting': agent.behavior = 'chatting'; break;
              case 'collaborate': agent.behavior = 'working'; break;
            }
          });
        }
        interactionTimer = 600 + Math.random() * 1200;
      }

      if (activeInteraction) {
        interactionDuration--;
        if (interactionDuration <= 0) {
          activeInteraction.agents.forEach(id => {
            const agent = agents.find(a => a.id === id);
            if (agent) agent.behavior = randomBehavior();
          });
          activeInteraction = null;
        }
      }

      agents.forEach(agent => {
        const isInInteraction = activeInteraction?.agents.includes(agent.id);
        if (!isInInteraction) {
          agent.behaviorTimer--;
          if (agent.behaviorTimer <= 0) {
            agent.behavior = randomBehavior();
            const [, maxDur] = BEHAVIORS[agent.behavior].duration;
            agent.behaviorTimer = Math.random() * maxDur * 60 + 100;
          }
        }
        if (agent.behavior === 'walking' && !isInInteraction) {
          agent.walkTimer--;
          if (agent.walkTimer <= 0) {
            agent.x += (Math.random() - 0.5) * 40;
            agent.y += (Math.random() - 0.5) * 30;
            agent.x = Math.max(40, Math.min(W - 40, agent.x));
            agent.y = Math.max(80, Math.min(H - 40, agent.y));
            agent.walkTimer = 60 + Math.random() * 120;
          }
        }
        drawAgent(agent);

        // 互动连线效果
        if (isInInteraction && activeInteraction) {
          const otherIds = activeInteraction.agents.filter(id => id !== agent.id);
          otherIds.forEach(otherId => {
            const other = agents.find(a => a.id === otherId);
            if (other) {
              ctx.save();
              ctx.strokeStyle = '#3B82F6';
              ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.2;
              ctx.lineWidth = 2;
              ctx.setLineDash([4, 4]);
              ctx.beginPath();
              ctx.moveTo(agent.x, agent.y);
              ctx.lineTo(other.x, other.y);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.restore();
            }
          });
        }
      });

      // 更新统计
      const stats = {
        total: agents.length,
        working: agents.filter(a => a.behavior === 'working').length,
        gaming: agents.filter(a => a.behavior === 'gaming').length,
        sleeping: agents.filter(a => a.behavior === 'sleeping').length,
      };
      document.getElementById('stats').innerHTML = `
        <span>👥 ${stats.total} 人</span>
        <span>🔥 ${stats.working} 工作中</span>
        <span>🎮 ${stats.gaming} 摸鱼</span>
        <span>😴 ${stats.sleeping} 睡觉</span>
      `;

      requestAnimationFrame(animate);
    }

    // 点击检测
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      for (const agent of agents) {
        if (Math.abs(mx - agent.x) < 27 && Math.abs(my - agent.y) < 27) {
          showModal(agent);
          return;
        }
      }
      hideModal();
    });

    function showModal(agent) {
      selectedAgent = agent;
      const bc = BEHAVIORS[agent.behavior];
      document.getElementById('modalEmoji').textContent = agent.emoji;
      document.getElementById('modalName').textContent = agent.name;
      document.getElementById('modalBehavior').textContent = `${bc.icon} ${bc.label}`;
      document.getElementById('modalBehavior').style.background = bc.color + '20';
      document.getElementById('modalBehavior').style.color = bc.color;
      document.getElementById('modalDesc').textContent = agent.description;
      document.getElementById('modalDept').textContent = DEPT_LIST.find(d => d.key === agent.department)?.name || agent.department;
      document.getElementById('modalId').textContent = agent.id;

      // 任务历史
      const agentHistory = taskHistory.filter(h => h.agentId === agent.id);
      const historyDiv = document.getElementById('modalHistory');
      const historyList = document.getElementById('modalHistoryList');
      if (agentHistory.length > 0) {
        historyDiv.style.display = 'block';
        historyList.innerHTML = agentHistory.slice(0, 5).map(h => `
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${h.status === 'running' ? '#eab308' : h.status === 'completed' ? '#22c55e' : '#ef4444'}"></span>
            <span style="flex:1;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h.task}</span>
            <span style="color:#999;">${new Date(h.startTime).toLocaleTimeString()}</span>
          </div>
        `).join('');
      } else {
        historyDiv.style.display = 'none';
      }

      document.getElementById('modal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
      selectedAgent = null;
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) hideModal();
    });

    // 默认选中工程部
    selectDept('engineering');
    animate();
  </script>
</body>
</html>
